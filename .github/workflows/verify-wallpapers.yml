name: Verify Wallpaper Cask Checksums

on:
  pull_request:
    paths:
      - "Casks/*wallpapers*.rb"
      - "scripts/verify-wallpapers.py"
      - ".github/workflows/verify-wallpapers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Verify wallpaper cask checksums
        run: python3 scripts/verify-wallpapers.py
