name: Verify Wallpaper Cask Checksums

on:
  pull_request:
    paths:
      - "Casks/*wallpapers*.rb"
      - "scripts/verify-wallpapers.py"
      - ".github/workflows/verify-wallpapers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"

      - name: Verify wallpaper cask checksums
        run: python3 scripts/verify-wallpapers.py
