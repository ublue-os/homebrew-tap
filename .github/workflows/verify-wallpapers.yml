name: Verify Wallpaper Cask Checksums

on:
  pull_request:
    paths:
      - "Casks/*wallpapers*.rb"
      - "scripts/verify-wallpapers.py"
      - ".github/workflows/verify-wallpapers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.14"

      - name: Verify wallpaper cask checksums
        run: python3 scripts/verify-wallpapers.py
